name: Publish to GitHub Pages

# Builds the Quarto site and deploys it to GitHub Pages on every push to main.
# The site does not run any code (charts and the CV PDF are pre-built and
# committed), so the job only needs Quarto, no Python or Spark.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Deploy to gh-pages branch
        uses: JamesIves/actions-gh-pages@v4
        with:
          branch: gh-pages
          folder: _site
          clean: true
          token: ${{ secrets.GITHUB_TOKEN }}
